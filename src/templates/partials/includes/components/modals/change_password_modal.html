{# Change Password Modal - included in page, shown/hidden via JS #}
<div id="change-password-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm hidden">
    <div class="settings-modal-panel bg-white dark:bg-zinc-800 rounded-xl p-6 w-full max-w-md mx-4 border border-zinc-200 dark:border-zinc-700 animate-scale-in">
        <h3 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100 mb-4">{{ t("change_password.title") }}</h3>
        <div id="password-modal-message"></div>
        <form id="change-password-form" class="space-y-4">
            <div class="input-group">
                <label class="input-label">{{ t("change_password.current_password") }}</label>
                <input type="password" id="modal-current-password" class="input" placeholder="{{ t("change_password.enter_current") }}" required>
            </div>
            <div class="input-group">
                <label class="input-label">{{ t("change_password.new_password") }}</label>
                <input type="password" id="modal-new-password" class="input" placeholder="{{ t("change_password.enter_new") }}" required minlength="4">
            </div>
            <div class="input-group">
                <label class="input-label">{{ t("change_password.confirm_password") }}</label>
                <input type="password" id="modal-confirm-password" class="input" placeholder="{{ t("change_password.enter_confirm") }}" required minlength="4">
            </div>
            <div class="settings-modal-actions flex justify-end gap-2 pt-2">
                <button type="button" onclick="hideChangePasswordModal()" class="btn btn-secondary">{{ t("common.cancel") }}</button>
                <button type="submit" id="modal-save-password-btn" class="btn btn-primary inline-flex items-center space-x-2">
                    <span class="btn-text">{{ t("common.save") }}</span>
                    <span class="btn-spinner hidden"><div class="spinner h-4 w-4"></div></span>
                </button>
            </div>
        </form>
    </div>
</div>
