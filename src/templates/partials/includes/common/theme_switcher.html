<!-- Theme switcher -->
<div id="theme-switcher" class="theme-switcher ml-2 flex items-center p-1.5">
    <!-- Light theme -->
    <button
        type="button"
        data-theme-btn="light"
        class="theme-icon-btn"
        aria-label="Light theme"
    >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
    </button>
    <!-- Dark theme -->
    <button
        type="button"
        data-theme-btn="dark"
        class="theme-icon-btn"
        aria-label="Dark theme"
    >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
    </button>
    <!-- Monochrome theme -->
    <button
        type="button"
        data-theme-btn="monochrome"
        class="theme-icon-btn"
        aria-label="Monochrome theme"
    >
        <svg class="w-5 h-5" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="8" fill="white" stroke="currentColor" stroke-width="2"/>
            <path d="M12 4a8 8 0 000 16V4z" fill="black"/>
            <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
        </svg>
    </button>
</div>
