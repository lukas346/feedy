<!-- Theme initialization script (runs before render to prevent flash) -->
<script>
    (function() {
        var theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.classList.remove('dark', 'monochrome');
        if (theme === 'dark') {
            document.documentElement.classList.add('dark');
        } else if (theme === 'monochrome') {
            document.documentElement.classList.add('monochrome');
        }
    })();
</script>

<!-- Article text size initialization (runs before render to prevent flash) -->
<script>
    (function() {
        try {
            var size = localStorage.getItem('feedy.articleTextSize');
            var sizes = ['small', 'medium', 'large', 'xlarge'];
            if (sizes.indexOf(size) !== -1) {
                document.documentElement.setAttribute('data-article-text-size', size);
            }
        } catch (error) {
            document.documentElement.removeAttribute('data-article-text-size');
        }
    })();
</script>
