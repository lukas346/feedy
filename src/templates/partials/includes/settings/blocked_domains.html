{% from 'partials/includes/components/section_header.html' import section_header %}

<!-- Blocked Domains Section -->
<section class="card p-6">
    {{ section_header(
        title=t('settings.blocked_domains.title'),
        subtitle=t('settings.blocked_domains.subtitle'),
        icon='ban',
        gradient_from='red-500/20',
        gradient_to='orange-500/20',
        icon_color='red-600'
    ) }}

    <!-- Blocked Domains List -->
    <div id="blocked-domains-list" hx-get="/settings/blocked-domains" hx-trigger="load, refresh" hx-swap="innerHTML">
        <div class="flex justify-center py-8">
            <div class="spinner h-8 w-8"></div>
        </div>
    </div>
</section>

<script>
    // Blocked domain handlers
    async function unblockDomain(id, domain, btnElement) {
        await CRUD.delete({
            endpoint: '/api/blocked-domains/' + id,
            name: domain,
            element: btnElement,
            listIds: ['blocked-domains-list'],
            messages: {
                confirm: '{{ t("settings.blocked_domains.unblock_confirm_message") }}',
                title: '{{ t("settings.blocked_domains.unblock") }}',
                error: '{{ t("settings.blocked_domains.unblock_failed") }}',
                errorTitle: '{{ t("common.error") }}'
            },
            originalIcon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
        });
    }
</script>
