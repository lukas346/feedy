{% from 'partials/includes/components/section_header.html' import section_header %}

<!-- Categories Section -->
<section class="card p-6">
    {{ section_header(
        title=t('settings.categories.title'),
        subtitle=t('settings.categories.subtitle'),
        icon='tag',
        action_text=t('settings.categories.add'),
        action_onclick='showAddCategoryForm()'
    ) }}

    <!-- Add Category Form (hidden by default) -->
    <form
        id="add-category-form"
        class="hidden mb-6 p-5 form-section animate-scale-in"
        hx-post="/settings/categories"
        hx-target="#categories-list"
        hx-swap="innerHTML"
        hx-on::after-request="handleCategoryFormResponse(event)"
    >
        <div class="settings-icon-name-row flex flex-col sm:flex-row gap-4">
            <!-- Icon Picker -->
            <div class="input-group">
                <label class="input-label">{{ t('settings.categories.icon') }}</label>
                <input type="hidden" name="icon" id="category-icon-input" value="tag">
                <div class="relative">
                    <button
                        type="button"
                        id="icon-picker-btn"
                        onclick="toggleIconPicker()"
                        class="w-12 h-12 rounded-lg border border-zinc-300 dark:border-zinc-600 bg-white dark:bg-zinc-800 flex items-center justify-center hover:border-blue-500 dark:hover:border-blue-400 transition-colors"
                    >
                        <span id="selected-icon-preview" class="w-5 h-5 text-zinc-600 dark:text-zinc-300"></span>
                    </button>
                    <!-- Icon Picker Popover -->
                    <div
                        id="icon-picker-popover"
                        class="hidden absolute left-0 top-12 z-50 p-2 bg-white dark:bg-zinc-800 rounded-xl border border-zinc-200 dark:border-zinc-700"
                        style="width: 200px;"
                    >
                        <div class="grid grid-cols-4 gap-1" id="icon-grid">
                            <!-- Icons populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex-1 input-group">
                <label class="input-label">{{ t('settings.categories.name') }}</label>
                <input
                    type="text"
                    name="name"
                    required
                    class="input"
                    placeholder="{{ t('settings.categories.name_placeholder') }}"
                >
            </div>
            <div class="settings-form-actions flex items-end gap-2">
                <button type="submit" id="save-category-btn" class="btn btn-primary inline-flex items-center space-x-2">
                    <span class="btn-text">{{ t('common.save') }}</span>
                    <span class="btn-spinner hidden">
                        <div class="spinner h-4 w-4"></div>
                    </span>
                </button>
                <button type="button" onclick="hideAddCategoryForm()" class="btn btn-secondary">
                    {{ t('common.cancel') }}
                </button>
            </div>
        </div>
    </form>

    <!-- Categories List -->
    <div id="categories-list" hx-get="/settings/categories" hx-trigger="load, refresh" hx-swap="innerHTML">
        <div class="flex justify-center py-8">
            <div class="spinner h-8 w-8"></div>
        </div>
    </div>
</section>

<script>
    // Category form handling
    function showAddCategoryForm() {
        var form = document.getElementById('add-category-form');
        form.classList.remove('hidden');
        form.querySelector('input[name="name"]').focus();
    }

    function hideAddCategoryForm() {
        var form = document.getElementById('add-category-form');
        form.classList.add('hidden');
        form.reset();
        document.getElementById('category-icon-input').value = 'tag';
        updateIconPreview('tag');
        document.getElementById('icon-picker-popover').classList.add('hidden');
        setButtonLoading(document.getElementById('save-category-btn'), false);
    }

    function handleCategoryFormResponse(event) {
        if (event.detail.successful) {
            hideAddCategoryForm();
            htmx.trigger('#categories-list', 'refresh');
            // Also refresh the website category dropdown if form is visible
            var form = document.getElementById('add-website-form');
            if (form && !form.classList.contains('hidden')) {
                loadCategoryOptions();
            }
        }
    }

    // Edit/Delete handlers for categories
    function editCategory(id, currentName, currentIcon) {
        showEditCategoryModal(id, currentName, currentIcon || 'tag');
    }

    function showEditCategoryModal(id, name, icon) {
        var modal = document.getElementById('edit-category-modal');
        if (!modal) return;

        document.getElementById('edit-category-id').value = id;
        document.getElementById('edit-category-name').value = name;
        document.getElementById('edit-category-icon').value = icon;
        updateEditIconPreview(icon);
        modal.classList.remove('hidden');
        document.getElementById('edit-category-name').focus();
    }

    // Initialize edit category modal on page load
    document.addEventListener('DOMContentLoaded', function() {
        var modal = document.getElementById('edit-category-modal');
        if (modal) {
            modal.addEventListener('click', function(e) {
                if (e.target === modal) hideEditCategoryModal();
            });
            initEditIconPicker();
        }
    });

    function hideEditCategoryModal() {
        var modal = document.getElementById('edit-category-modal');
        if (modal) {
            modal.classList.add('hidden');
            setButtonLoading(document.getElementById('edit-category-save-btn'), false);
        }
    }

    async function saveEditCategory() {
        var id = document.getElementById('edit-category-id').value;
        var newName = document.getElementById('edit-category-name').value;
        var newIcon = document.getElementById('edit-category-icon').value;
        var saveBtn = document.getElementById('edit-category-save-btn');

        if (!newName.trim()) {
            await Modal.error('{{ t("settings.categories.name_required") }}', '{{ t("validation.error_title") }}');
            return;
        }

        setButtonLoading(saveBtn, true);

        fetch('/api/categories/' + id, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: newName, icon: newIcon})
        }).then(async function(response) {
            if (response.ok) {
                hideEditCategoryModal();
                htmx.trigger('#categories-list', 'refresh');
                var form = document.getElementById('add-website-form');
                if (form && !form.classList.contains('hidden')) {
                    loadCategoryOptions();
                }
            } else {
                setButtonLoading(saveBtn, false);
                await Modal.error('{{ t("settings.categories.update_failed") }}', '{{ t("common.error") }}');
            }
        }).catch(async function() {
            setButtonLoading(saveBtn, false);
            await Modal.error('{{ t("settings.categories.update_failed") }}', '{{ t("common.error") }}');
        });
    }

    async function deleteCategory(id, name, btnElement) {
        await CRUD.delete({
            endpoint: '/api/categories/' + id,
            name: name,
            element: btnElement,
            listIds: ['categories-list', 'websites-list'],
            messages: {
                confirm: '{{ t("settings.categories.delete_confirm_message") }}',
                title: '{{ t("common.delete") }}',
                error: '{{ t("settings.categories.delete_failed") }}',
                errorTitle: '{{ t("common.error") }}'
            },
            originalIcon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>',
            onSuccess: function() {
                var form = document.getElementById('add-website-form');
                if (form && !form.classList.contains('hidden')) {
                    loadCategoryOptions();
                }
            }
        });
    }

    // HTMX event listener for category form loading state
    document.addEventListener('htmx:beforeRequest', function(event) {
        if (event.detail.elt.id === 'add-category-form') {
            setButtonLoading(document.getElementById('save-category-btn'), true);
        }
    });

    document.addEventListener('htmx:afterRequest', function(event) {
        if (event.detail.elt.id === 'add-category-form') {
            setButtonLoading(document.getElementById('save-category-btn'), false);
        }
    });
</script>
