<!-- Language Section -->
<section class="card p-6">
    <div class="section-header mb-6">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500/20 to-teal-500/20 dark:from-cyan-500/10 dark:to-teal-500/10 flex items-center justify-center">
                <svg class="w-5 h-5 text-cyan-600 dark:text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
                </svg>
            </div>
            <div>
                <h2 class="section-title">{{ t('settings.language.title') }}</h2>
                <p class="text-secondary">{{ t('settings.language.subtitle') }}</p>
            </div>
        </div>
    </div>
    <!-- Language selector buttons -->
    <div class="flex flex-wrap gap-2" id="language-selector">
        {% for lang_code in supported_languages %}
        <button
            type="button"
            onclick="setLanguage('{{ lang_code }}')"
            class="language-btn px-4 py-2 rounded-lg border transition-all duration-200
                   {% if current_lang == lang_code %}
                   border-blue-500 bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300
                   {% else %}
                   border-zinc-200 dark:border-zinc-700 hover:border-blue-400 dark:hover:border-blue-500 text-zinc-700 dark:text-zinc-300
                   {% endif %}"
            data-lang="{{ lang_code }}"
        >
            {% if lang_code == 'en' %}English{% elif lang_code == 'pl' %}Polski{% else %}{{ lang_code }}{% endif %}
        </button>
        {% endfor %}
        <button
            type="button"
            onclick="setLanguage(null)"
            class="language-btn px-4 py-2 rounded-lg border transition-all duration-200
                   {% if not user_language_set %}
                   border-blue-500 bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300
                   {% else %}
                   border-zinc-200 dark:border-zinc-700 hover:border-blue-400 dark:hover:border-blue-500 text-zinc-700 dark:text-zinc-300
                   {% endif %}"
            data-lang="auto"
        >
            {{ t('settings.language.auto') }}
        </button>
    </div>
</section>

<script>
    // Language selection
    async function setLanguage(lang) {
        try {
            const response = await fetch('/api/settings/language', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({language: lang})
            });
            if (response.ok) {
                window.location.reload();
            }
        } catch (error) {
            console.error('Failed to update language:', error);
        }
    }
</script>
